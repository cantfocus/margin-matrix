<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Margin Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Dark theme (default) */
      --bg:       #0d0f0e;
      --surface:  #151817;
      --surface2: #1c1f1e;
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.16);
      --text:     #f1f4f2;
      --muted:    #9ba6a1;
      --dim:      #5a625e;
      --accent:   #c8f060;
      --dem:      #6aa8ff;
      --rep:      #ff7e64;
      --lib:      #f5c043;
      --npd:      #b495ff;
      --other:    #8a929a;
      --col-name: 200px;
      --col-drop: 170px;
      --sidebar-w: 260px;
      --header-h: 53px;
      --toolbar-h: 45px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    [data-theme="light"] {
      --bg:       #f8f7f3;
      --surface:  #ffffff;
      --surface2: #efece5;
      --border:   rgba(0,0,0,0.08);
      --border2:  rgba(0,0,0,0.16);
      --text:     #1a1d1c;
      --muted:    #555c58;
      --dim:      #8a8f8c;
      --accent:   #4a8a00;
      --dem:      #1f6feb;
      --rep:      #c9341a;
      --lib:      #b07a00;
      --npd:      #6d44d9;
      --other:    #555c58;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ---- Header ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--header-h);
    }
    .logo { font-family: var(--font-head); font-size: 18px; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
    .logo span { color: var(--muted); font-weight: 400; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-meta {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .theme-toggle {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.15s;
    }
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
      transform: rotate(-15deg);
    }

    /* ---- Toolbar ---- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: var(--header-h);
      z-index: 199;
      flex-wrap: wrap;
      height: var(--toolbar-h);
    }
    .source-toggle { display: flex; border: 1px solid var(--border2); border-radius: 6px; overflow: hidden; }
    .source-toggle button {
      padding: 5px 14px; font-family: var(--font-mono); font-size: 12px;
      border: none; background: transparent; color: var(--muted); cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .source-toggle button.active { background: var(--surface2); color: var(--accent); }

    .jump-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--muted);
      padding: 5px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .jump-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(200,240,96,0.05);
    }
    .jump-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .jump-btn:disabled:hover {
      color: var(--muted);
      border-color: var(--border2);
      background: var(--surface2);
    }

    select, input[type="text"], input[type="number"] {
      font-family: var(--font-mono); font-size: 12px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; color: var(--text); padding: 5px 10px;
    }
    input[type="text"]::placeholder { color: var(--dim); }
    input[type="number"] { width: 72px; }

    .toolbar-label { font-size: 11px; font-weight: 600; color: var(--muted); white-space: nowrap; letter-spacing: 0.04em; text-transform: uppercase; }
    .last-updated { margin-left: auto; font-size: 11px; color: var(--dim); }

    /* ---- Page body: content + sidebar ---- */
    .page-body {
      display: flex;
      align-items: flex-start;
      min-height: calc(100vh - var(--header-h) - var(--toolbar-h));
    }

    /* ---- Main content ---- */
    #main-content {
      flex: 1;
      min-width: 0;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ---- Sidebar ---- */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: calc(var(--header-h) + var(--toolbar-h));
      height: calc(100vh - var(--header-h) - var(--toolbar-h));
      overflow-y: auto;
      transition: width 0.2s ease;
    }
    #sidebar.collapsed { width: 36px; overflow: hidden; }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .sidebar-toggle-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 0;
      background: var(--surface2);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
    }
    .sidebar-toggle-btn:hover { color: var(--text); }
    .sidebar-toggle-btn .toggle-icon { font-size: 14px; flex-shrink: 0; }
    .sidebar-toggle-btn .toggle-label { transition: opacity 0.15s; }
    #sidebar.collapsed .toggle-label { opacity: 0; width: 0; }

    .sidebar-inner { padding: 8px 0; }
    #sidebar.collapsed .sidebar-inner { display: none; }

    .sidebar-section { margin-bottom: 4px; }
    .sidebar-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .sidebar-section-head:hover { color: var(--text); }
    .sidebar-chevron { font-size: 10px; transition: transform 0.15s; }
    .sidebar-section.closed .sidebar-chevron { transform: rotate(-90deg); }
    .sidebar-section.closed .sidebar-items { display: none; }

    .sidebar-section.jump-flash > .sidebar-section-head {
      background: rgba(200,240,96,0.1);
      transition: background 0.6s;
    }

    .sidebar-items { padding: 2px 0 8px; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 4px;
      margin: 0 4px;
    }
    .sidebar-item:hover { background: var(--surface2); }
    .sidebar-item input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .sidebar-item-label { font-size: 12px; font-weight: 500; color: var(--muted); line-height: 1.3; }
    .sidebar-item.checked .sidebar-item-label { color: var(--text); font-weight: 600; }

    .sidebar-actions {
      display: flex;
      gap: 8px;
      padding: 4px 12px 8px;
    }
    .sidebar-action-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .sidebar-action-btn:hover { color: var(--muted); }

    .sidebar-controls {
      padding: 10px 12px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
    }
    .sidebar-filter-input {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      padding: 5px 8px;
      margin-bottom: 6px;
    }
    .sidebar-filter-input::placeholder { color: var(--dim); }
    .sidebar-bulk-actions {
      display: flex;
      gap: 10px;
      padding: 2px 0 0;
    }
    .sidebar-count {
      font-size: 10px;
      color: var(--dim);
      margin-top: 6px;
      letter-spacing: 0.04em;
    }
    .sidebar-empty {
      padding: 16px 12px;
      font-size: 11px;
      color: var(--dim);
      text-align: center;
    }

    /* ---- Race card ---- */
    .race-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: var(--surface); }
    .race-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .race-name { font-family: var(--font-head); font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
    .race-meta { font-size: 11px; font-weight: 500; color: var(--muted); }

    /* ---- Row-based grid table ---- */
    .race-table-wrap { overflow-x: auto; }
    .race-table-wrap::-webkit-scrollbar { height: 4px; }
    .race-table-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .race-table { display: grid; min-width: max-content; width: 100%; }
    .table-row { display: contents; }

    .cell {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center; gap: 3px;
      min-width: 0;
    }
    .cell:last-child { border-right: none; }

    .cell-head {
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
      min-height: 78px; padding: 8px 12px; justify-content: center;
    }
    .cell-name {
      position: sticky; left: 0; z-index: 10;
      background: var(--surface); border-right: 1px solid var(--border2);
    }
    .cell-head.cell-name { background: var(--surface2); z-index: 11; }
    .cell-newest { background: rgba(200,240,96,0.025); }
    .cell-head.cell-newest { background: rgba(200,240,96,0.04); }

    /* Hidden rows: use display:none on the row-div won't work with display:contents,
       so we hide via the cells directly using a class on the row + CSS child selector */
    .table-row.row-hidden > .cell { display: none; }

    .race-table .table-row:last-child > .cell { border-bottom: none; }

    /* ---- Cell content ---- */
    .col-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .drop-ts { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: baseline; gap: 6px; }
    .drop-ts.newest-ts { color: var(--accent); font-weight: 700; }
    .drop-date { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0; }
    .drop-ts.newest-ts .drop-date { color: var(--muted); }
    .drop-total-line { font-size: 10px; font-weight: 500; color: var(--muted); }
    .rep-bar { height: 2px; background: var(--border2); border-radius: 1px; margin-top: 4px; overflow: hidden; }
    .rep-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; opacity: 0.5; }
    .bucket-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(200,240,96,0.08);
      padding: 1px 5px;
      border-radius: 3px;
      width: fit-content;
      margin-top: 2px;
    }

    .cand-name-text { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cand-party-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; width: fit-content; }
    .party-Dem  { background: rgba(91,156,246,0.15);  color: var(--dem); }
    .party-Rep  { background: rgba(244,114,90,0.15);  color: var(--rep); }
    .party-Lib  { background: rgba(240,180,41,0.15);  color: var(--lib); }
    .party-NPP  { background: rgba(167,139,250,0.15); color: var(--npd); }
    .party-other{ background: rgba(107,114,128,0.15); color: var(--other); }

    .hide-btn {
      font-size: 10px; color: var(--dim); cursor: pointer; border: none;
      background: none; padding: 0; font-family: var(--font-mono);
      text-decoration: underline; text-underline-offset: 2px; text-align: left;
    }
    .hide-btn:hover { color: var(--muted); }

    .race-copy-link {
      font-size: 10px; color: var(--dim); cursor: pointer; border: none;
      background: none; padding: 2px 6px; font-family: var(--font-mono);
      text-decoration: underline; text-underline-offset: 2px; border-radius: 4px;
    }
    .race-copy-link:hover { color: var(--accent); }

    .cand-other { font-style: italic; }
    .cand-other .cand-name-text { color: var(--muted); font-size: 12px; }
    .cand-other .pct-big { color: var(--muted); font-size: 14px; }
    .cand-other .votes-sub,
    .cand-other .new-line { color: var(--dim); }

    .pct-line { display: flex; align-items: baseline; gap: 6px; }
    .pct-big { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
    .votes-sub { font-size: 11px; font-weight: 500; color: var(--muted); }
    .pct-bar { height: 2px; background: var(--border2); border-radius: 1px; margin: 3px 0; overflow: hidden; }
    .pct-bar-fill { height: 100%; border-radius: 1px; }
    .new-line { font-size: 10px; font-weight: 500; color: var(--dim); margin-top: 1px; }
    .delta-inline { font-size: 11px; font-weight: 600; }
    .delta-inline.pos { color: var(--accent); }
    .delta-inline.neg { color: var(--rep); }

    .loading-msg, .empty-msg { padding: 32px; text-align: center; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<header>
  <div class="logo">margin<span>_</span>matrix</div>
  <div class="header-right">
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle theme">
      <span id="theme-icon">☾</span>
    </button>
    <span class="header-meta" id="header-meta">2026 CA Primary</span>
  </div>
</header>

<div class="toolbar">
  <div class="source-toggle">
    <button onclick="setSource('statewide', this)">Statewide</button>
    <button class="active" onclick="setSource('la_county', this)">LA County</button>
  </div>
  <button class="jump-btn" id="jump-la-btn" onclick="jumpToCityOfLA()" title="Jump to Los Angeles City in sidebar">↳ LA City</button>
  <input type="text" id="cand-search" placeholder="Filter candidates…" oninput="applyFilters()" style="min-width:150px" />
  <span class="toolbar-label">Min %</span>
  <input type="number" id="pct-threshold" value="0" min="0" max="100" step="0.5" oninput="applyFilters()" />
  <span class="toolbar-label">Group</span>
  <select id="bucket-size" onchange="applyFilters()">
    <option value="0">Every drop</option>
    <option value="5">5 min</option>
    <option value="15">15 min</option>
    <option value="30">30 min</option>
    <option value="60">1 hour</option>
    <option value="120">2 hours</option>
    <option value="720">12 hours</option>
    <option value="1440">1 day</option>
  </select>
  <span class="last-updated" id="last-updated">—</span>
</div>

<div class="page-body">
  <main id="main-content">
    <div class="loading-msg">Loading races…</div>
  </main>

  <!-- Sidebar -->
  <aside id="sidebar">
    <button class="sidebar-toggle-btn" onclick="toggleSidebar()">
      <span class="toggle-icon" id="sidebar-icon">◀</span>
      <span class="toggle-label">Races</span>
    </button>
    <div class="sidebar-inner" id="sidebar-inner">
      <!-- populated by JS -->
    </div>
  </aside>
</div>

<script>
  // STATIC_MODE is flipped to true by build_static.py when generating
  // the static site. In static mode, fetches go to pre-baked JSON files
  // instead of Flask API endpoints, and the auto-refresh is disabled.
  const STATIC_MODE = true;

  // BUILD_VERSION is replaced by build_static.py to bust browser caches
  // on every new build. Empty string in dev mode.
  const BUILD_VERSION = "20260606-232322";

  // ---------------------------------------------------------------------------
  // Theme: persists in localStorage, defaults to dark.
  // Static mode + GitHub Pages keep localStorage per-origin so this works
  // identically on the deployed site.
  // ---------------------------------------------------------------------------
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const icon = document.getElementById('theme-icon');
    if (icon) icon.textContent = theme === 'light' ? '☀' : '☾';
  }
  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'light' ? 'dark' : 'light';
    try { localStorage.setItem('mm_theme', next); } catch (e) {}
    applyTheme(next);
  }
  (function initTheme() {
    let saved = 'dark';
    try { saved = localStorage.getItem('mm_theme') || 'dark'; } catch (e) {}
    applyTheme(saved);
  })();

  // Show the build version (truncated) in the header in static mode so
  // you can verify which build the browser is showing.
  if (STATIC_MODE && BUILD_VERSION) {
    const el = document.getElementById('header-meta');
    if (el) el.textContent = '2026 CA Primary · build ' + BUILD_VERSION;
  }

  const state = {
    source: 'la_county',
    candSearch: '',
    pctThreshold: 0,
    bucketMinutes: 0,
    hiddenCandidates: new Set(),
    sidebarCollapsed: false,
    sidebarFilter: '',
    races: [],          // all races from /api/offices
    visibleRaces: new Set(), // contest_ids currently checked
    sidebarOpen: {},    // office group → bool
    raceData: {},
  };

  const PARTY_COLORS = { Dem:'#5b9cf6', Rep:'#f4725a', Lib:'#f0b429', NPP:'#a78bfa', 'P&F':'#fb923c' };
  function partyColor(p) { return PARTY_COLORS[p] || '#6b7280'; }
  function partyClass(p) {
    if (p==='Dem') return 'party-Dem';
    if (p==='Rep') return 'party-Rep';
    if (p==='Lib') return 'party-Lib';
    if (p==='NPP') return 'party-NPP';
    return 'party-other';
  }
  function fmt(n)    { return Number(n).toLocaleString(); }
  function fmtPct(n) { return Number(n).toFixed(1)+'%'; }
  function fmtTs(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
  }
  function fmtDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return (d.getMonth() + 1) + '/' + d.getDate();
  }

  // ---------------------------------------------------------------------------
  // Derive a friendly sidebar group and item label from a race row.
  //
  // LA County offices come in as long strings like:
  //   "CITY OF COVINA GENERAL MUNICIPAL ELECTION City Clerk"
  //   "BEVERLY HILLS UNIFIED SCHOOL DISTRICT Member of the Board of Education"
  //   "LAS VIRGENES MUNICIPAL WATER DISTRICT Director, Division 1"
  // We split these into a logical parent (the jurisdiction) and a child
  // (the specific seat) so the sidebar collapses cleanly.
  //
  // Returns { group, label } where group is the sidebar section heading
  // and label is the checkbox label inside that section.
  // ---------------------------------------------------------------------------
  function deriveSidebarGroup(race) {
    const office = (race.office || '').trim();
    const district = race.district || '';

    // For statewide data, keep the existing behavior (office is already clean,
    // district lives in its own field).
    if (race.source !== 'la_county') {
      return {
        group: office,
        label: district || office,
      };
    }

    // LA County: try to split on common election-type phrases.
    // Everything before the phrase is the jurisdiction;
    // everything after is the seat name.
    const splitPatterns = [
      / (PRIMARY NOMINATING ELECTION) /i,
      / (GENERAL MUNICIPAL ELECTION) /i,
      / (SPECIAL MUNICIPAL ELECTION) /i,
      / (REGULAR MUNICIPAL ELECTION) /i,
      / (MUNICIPAL ELECTION) /i,
      / (SPECIAL ELECTION) /i,
      / (GENERAL ELECTION) /i,
    ];

    for (const re of splitPatterns) {
      const m = office.match(re);
      if (m) {
        const jurisdiction = office.slice(0, m.index).trim();
        const seat         = office.slice(m.index + m[0].length).trim();
        return {
          group: titleCase(jurisdiction),
          label: cleanLabel(seat),
        };
      }
    }

    // School / water / community college districts: split before the seat
    // keywords. The jurisdiction is everything up to and including the
    // "...DISTRICT" word.
    const districtSplit = office.match(
      /^(.*?DISTRICT)\s+(Member of the Board.*|Director.*|Governing Board.*|Trustee.*|Board Member.*)$/i
    );
    if (districtSplit) {
      return {
        group: titleCase(districtSplit[1]),
        label: cleanLabel(districtSplit[2]),
      };
    }

    // Measures: collapse all measures under a single "Measures" group
    if (/measure/i.test(office)) {
      return {
        group: 'LA County Measures',
        label: titleCase(office),
      };
    }

    // Group leftover countywide offices under "LA County Offices"
    // (these are things like Sheriff, Assessor, etc.)
    if (race.contest_group && race.contest_group.length > 0
        && !/^Cities$|^Schools$|^Member of the Assembly$|^U\.S\. Representative$|^State Senator$|^Judge Superior Court$|^Board of Supervisors$|^Community Services$/.test(race.contest_group)) {
      return {
        group: race.contest_group,
        label: titleCase(office),
      };
    }

    // Generic fallback: use the contest_group as the section, the office as the label
    return {
      group: race.contest_group || office,
      label: titleCase(office),
    };
  }

  // Convert SHOUTY CASE to Title Case while preserving small words
  function titleCase(s) {
    if (!s) return s;
    const small = new Set(['of','the','and','for','to','in','on','at','a','an','or']);
    return s.toLowerCase().split(/\s+/).map((w, i) => {
      // Preserve ordinals like 1st, 2nd, 3rd
      if (/^\d+(st|nd|rd|th)$/i.test(w)) return w.toLowerCase();
      if (i > 0 && small.has(w)) return w;
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  // Clean up seat labels: trim, title-case, normalize commas
  function cleanLabel(s) {
    if (!s) return s;
    return titleCase(s.replace(/\s+/g, ' ').trim());
  }

  // ---- Source toggle ----
  // Shared filter predicate used by sidebar search across all callers.
  function matchesSidebarFilter(r, filterStr) {
    if (!filterStr) return true;
    const g = deriveSidebarGroup(r);
    const office   = (r.office   || '').toLowerCase();
    const district = (r.district || '').toLowerCase();
    const group    = (r.contest_group || '').toLowerCase();
    return office.includes(filterStr) ||
           district.includes(filterStr) ||
           group.includes(filterStr) ||
           g.group.toLowerCase().includes(filterStr) ||
           g.label.toLowerCase().includes(filterStr);
  }

  function setSource(src, btn) {
    state.source = src;
    document.querySelectorAll('.source-toggle button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    updateJumpBtn();
    loadOffices();
  }

  // Enable jump button only when LA County is the active source
  function updateJumpBtn() {
    const btn = document.getElementById('jump-la-btn');
    if (btn) btn.disabled = state.source !== 'la_county';
  }

  // Scroll the sidebar to the "City of Los Angeles" section and open it.
  // If the sidebar is collapsed, open it first.
  function jumpToCityOfLA() {
    if (state.source !== 'la_county') return;

    // Open sidebar if collapsed
    if (state.sidebarCollapsed) {
      toggleSidebar();
    }

    // Clear the sidebar filter so the section is rendered
    if (state.sidebarFilter) {
      state.sidebarFilter = '';
      const inp = document.getElementById('sidebar-filter');
      if (inp) inp.value = '';
      buildSidebar();
    }

    const target = 'Los Angeles City';

    // Open the section if it's closed
    state.sidebarOpen[target] = true;

    // Re-render so the section is in its open state
    buildSidebar();

    // Find and scroll to the section
    requestAnimationFrame(() => {
      const section = document.querySelector(`.sidebar-section[data-office="${target}"]`);
      if (section) {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // Brief highlight pulse
        section.classList.add('jump-flash');
        setTimeout(() => section.classList.remove('jump-flash'), 1500);
      }
    });
  }

  // ---- Load offices, build sidebar ----
  async function loadOffices(preselect) {
    const url = STATIC_MODE
      ? `api/offices_${state.source}.json?v=${BUILD_VERSION}`
      : `/api/offices?source=${state.source}`;
    const res = await fetch(url);
    state.races = await res.json();
    state.raceData = {};

    if (preselect && preselect.size > 0) {
      const validIds = new Set(state.races.map(r => r.contest_id));
      state.visibleRaces = new Set([...preselect].filter(id => validIds.has(id)));
    } else {
      // Default: nothing selected — user picks which races to view from sidebar
      state.visibleRaces = new Set();
    }
    state.sidebarFilter = '';

    buildSidebar();
    renderAll();
    updateHash();
  }

  // ---- Sidebar ----
  function toggleSidebar() {
    state.sidebarCollapsed = !state.sidebarCollapsed;
    const sb   = document.getElementById('sidebar');
    const icon = document.getElementById('sidebar-icon');
    sb.classList.toggle('collapsed', state.sidebarCollapsed);
    icon.textContent = state.sidebarCollapsed ? '▶' : '◀';
  }

  function buildSidebar() {
    const inner = document.getElementById('sidebar-inner');
    inner.innerHTML = '';

    // ---- Filter input + bulk actions ----
    const controls = document.createElement('div');
    controls.className = 'sidebar-controls';
    controls.innerHTML = `
      <input type="text" id="sidebar-filter" class="sidebar-filter-input"
             placeholder="Filter races…"
             value="${state.sidebarFilter || ''}"
             oninput="onSidebarFilterChange(this.value)" />
      <div class="sidebar-bulk-actions">
        <button class="sidebar-action-btn" onclick="setFilteredAll(true)">select shown</button>
        <button class="sidebar-action-btn" onclick="setFilteredAll(false)">deselect shown</button>
      </div>
      <div class="sidebar-count" id="sidebar-count"></div>
    `;
    inner.appendChild(controls);

    // ---- Filtered races ----
    const filterStr = (state.sidebarFilter || '').toLowerCase().trim();
    const filtered  = state.races.filter(r => matchesSidebarFilter(r, filterStr));

    // Group by derived group name (collapses LA city/school/water districts)
    const groups = {};
    filtered.forEach(r => {
      const g = deriveSidebarGroup(r);
      if (!groups[g.group]) groups[g.group] = [];
      groups[g.group].push({ race: r, label: g.label });
    });

    Object.keys(groups).sort().forEach(groupName => {
      const entries = groups[groupName];
      const isOpen  = state.sidebarOpen[groupName] !== false;

      const section = document.createElement('div');
      section.className = 'sidebar-section' + (isOpen ? '' : ' closed');
      section.dataset.office = groupName;

      const head = document.createElement('div');
      head.className = 'sidebar-section-head';
      head.innerHTML = `<span>${groupName}</span><span class="sidebar-chevron">▾</span>`;
      head.onclick = () => toggleSidebarSection(section, groupName);
      section.appendChild(head);

      const items = document.createElement('div');
      items.className = 'sidebar-items';

      const actions = document.createElement('div');
      actions.className = 'sidebar-actions';
      actions.innerHTML = `
        <button class="sidebar-action-btn" onclick="setSectionAll('${groupName.replace(/'/g, "\\'")}', true)">all</button>
        <button class="sidebar-action-btn" onclick="setSectionAll('${groupName.replace(/'/g, "\\'")}', false)">none</button>`;
      items.appendChild(actions);

      entries.forEach(({ race, label }) => {
        const r = race;
        const checked = state.visibleRaces.has(r.contest_id);
        const itemLabel = r.district ? r.district : label;
        const item = document.createElement('label');
        item.className = 'sidebar-item' + (checked ? ' checked' : '');
        item.dataset.contestId = r.contest_id;
        item.innerHTML = `
          <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleRace(${r.contest_id}, this)" />
          <span class="sidebar-item-label">${itemLabel}</span>`;
        items.appendChild(item);
      });

      section.appendChild(items);
      inner.appendChild(section);
    });

    // No matches
    if (Object.keys(groups).length === 0) {
      const empty = document.createElement('div');
      empty.className = 'sidebar-empty';
      empty.textContent = filterStr ? 'No races match filter.' : 'No races available.';
      inner.appendChild(empty);
    }

    // Update count text
    const countEl = document.getElementById('sidebar-count');
    if (countEl) {
      const total    = state.races.length;
      const showing  = filtered.length;
      const selected = state.visibleRaces.size;
      countEl.textContent = filterStr
        ? `${showing} of ${total} shown · ${selected} selected`
        : `${total} races · ${selected} selected`;
    }
  }

  function onSidebarFilterChange(value) {
    state.sidebarFilter = value;
    // Rebuild only the sidebar so the input keeps focus
    const inner = document.getElementById('sidebar-inner');
    const active = document.activeElement;
    const wasFilterFocused = active && active.id === 'sidebar-filter';
    const cursorPos = wasFilterFocused ? active.selectionStart : null;
    buildSidebar();
    if (wasFilterFocused) {
      const newInput = document.getElementById('sidebar-filter');
      if (newInput) {
        newInput.focus();
        if (cursorPos != null) newInput.setSelectionRange(cursorPos, cursorPos);
      }
    }
  }

  function setFilteredAll(checked) {
    // Apply to currently-filtered races only
    const filterStr = (state.sidebarFilter || '').toLowerCase().trim();
    const filtered  = state.races.filter(r => matchesSidebarFilter(r, filterStr));
    filtered.forEach(r => {
      if (checked) state.visibleRaces.add(r.contest_id);
      else         state.visibleRaces.delete(r.contest_id);
    });
    buildSidebar();
    updateHash();
    renderAll();
  }

  function toggleSidebarSection(section, office) {
    section.classList.toggle('closed');
    state.sidebarOpen[office] = !section.classList.contains('closed');
  }

  function setSectionAll(office, checked) {
    const section = document.querySelector(`.sidebar-section[data-office="${office}"]`);
    if (!section) return;
    section.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      cb.checked = checked;
      const item = cb.closest('.sidebar-item');
      const cid  = parseInt(item.dataset.contestId);
      if (checked) state.visibleRaces.add(cid);
      else         state.visibleRaces.delete(cid);
      item.classList.toggle('checked', checked);
    });
    // Update count line
    const countEl = document.getElementById('sidebar-count');
    if (countEl) {
      const filterStr = (state.sidebarFilter || '').toLowerCase().trim();
      const total = state.races.length;
      const selected = state.visibleRaces.size;
      const filtered = state.races.filter(r => matchesSidebarFilter(r, filterStr));
      countEl.textContent = filterStr
        ? `${filtered.length} of ${total} shown · ${selected} selected`
        : `${total} races · ${selected} selected`;
    }
    updateHash();
    renderAll();
  }

  function toggleRace(contestId, cb) {
    if (cb.checked) state.visibleRaces.add(contestId);
    else            state.visibleRaces.delete(contestId);
    cb.closest('.sidebar-item').classList.toggle('checked', cb.checked);
    // Update count line
    const countEl = document.getElementById('sidebar-count');
    if (countEl) {
      const filterStr = (state.sidebarFilter || '').toLowerCase().trim();
      const total = state.races.length;
      const selected = state.visibleRaces.size;
      const filtered = state.races.filter(r => matchesSidebarFilter(r, filterStr));
      countEl.textContent = filterStr
        ? `${filtered.length} of ${total} shown · ${selected} selected`
        : `${total} races · ${selected} selected`;
    }
    updateHash();
    renderAll();
  }

  // ---- URL hash: encode/decode visible races so a selection can be shared ----
  function updateHash() {
    const params = new URLSearchParams();
    params.set('source', state.source);
    if (state.visibleRaces.size > 0) {
      params.set('races', [...state.visibleRaces].sort((a, b) => a - b).join(','));
    }
    if (state.pctThreshold > 0) {
      params.set('minpct', state.pctThreshold);
    }
    history.replaceState(null, '', '#' + params.toString());
  }

  function copyRaceLink(contestId, btn) {
    const params = new URLSearchParams();
    params.set('source', state.source);
    params.set('races', contestId);
    const url = location.origin + location.pathname + '#' + params.toString();
    const orig = btn.textContent;
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = 'copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    }).catch(() => {
      const tmp = document.createElement('textarea');
      tmp.value = url;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      document.execCommand('copy');
      document.body.removeChild(tmp);
      btn.textContent = 'copied!';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  // ---- Filters ----
  function applyFilters() {
    state.candSearch   = document.getElementById('cand-search').value.toLowerCase().trim();
    state.pctThreshold = parseFloat(document.getElementById('pct-threshold').value) || 0;
    state.bucketMinutes = parseInt(document.getElementById('bucket-size').value) || 0;
    updateHash();
    renderAll();
  }

  // ---- Fetch race data ----
  async function ensureRaceData(contestId) {
    if (state.raceData[contestId]) return;
    const url = STATIC_MODE
      ? `api/race/${contestId}.json?v=${BUILD_VERSION}`
      : `/api/race/${contestId}`;
    const res = await fetch(url);
    state.raceData[contestId] = await res.json();
  }

  // ---- Render ----
  async function renderAll() {
    const main  = document.getElementById('main-content');
    const races = state.races.filter(r => state.visibleRaces.has(r.contest_id));

    if (!races.length) {
      main.innerHTML = '<div class="empty-msg">No races selected. Use the sidebar to pick races.</div>';
      return;
    }
    main.innerHTML = '<div class="loading-msg">Loading…</div>';
    await Promise.all(races.map(r => ensureRaceData(r.contest_id)));

    let latestTs = null;
    races.forEach(r => {
      const d = state.raceData[r.contest_id];
      if (d && d.drops && d.drops[0]) {
        const ts = d.drops[0].batch_ts;
        if (!latestTs || ts > latestTs) latestTs = ts;
      }
    });
    document.getElementById('last-updated').textContent =
      latestTs ? 'Last drop: ' + fmtTs(latestTs) : '—';

    main.innerHTML = '';
    races.forEach(r => {
      const data = state.raceData[r.contest_id];
      if (data) main.appendChild(buildRaceCard(r, data));
    });
  }

  // ---- Build race card ----
  // ---------------------------------------------------------------------------
  // Group drops into time buckets.
  //
  //  - rawDrops comes in newest-first.
  //  - bucketMin = 0 means no bucketing (return drops as-is).
  //  - Buckets are aligned on the wall clock (e.g. 15-min buckets are at
  //    :00 :15 :30 :45 of each hour) so they don't shift around as new
  //    drops arrive.
  //  - For each bucket we keep the LATEST snapshot's vote totals (that's
  //    the state at the end of the window) and aggregate new_votes across
  //    every raw drop merged into the bucket.
  //  - Deltas (new_votes_pct of bucket, pct_delta vs prior bucket) are
  //    recomputed against the prior surviving bucket.
  // ---------------------------------------------------------------------------
  function bucketDrops(rawDrops, bucketMin) {
    if (!bucketMin || bucketMin <= 0 || rawDrops.length < 2) return rawDrops;

    const bucketMs = bucketMin * 60 * 1000;

    // Group rawDrops by their bucket key (floor of batch_ts to bucketMin)
    // rawDrops is newest-first; we'll work oldest-first to make diffing easier
    const oldestFirst = [...rawDrops].reverse();
    const groups = []; // [{ key, drops: [...oldest→newest within group] }]
    let curKey = null;

    // Align bucket boundaries to local midnight so that e.g. "1 day" produces
    // one bucket per calendar day regardless of timezone offset.
    function localBucketKey(ts) {
      const d = new Date(ts);
      const midnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      return midnight + Math.floor((ts - midnight) / bucketMs) * bucketMs;
    }

    oldestFirst.forEach(d => {
      const t   = new Date(d.batch_ts).getTime();
      const key = localBucketKey(t);
      if (curKey === null || key !== curKey) {
        groups.push({ key, drops: [] });
        curKey = key;
      }
      groups[groups.length - 1].drops.push(d);
    });

    // Build merged drops oldest-first so we can compute deltas vs prior
    const merged = [];
    let prevTotal = 0;
    const prevCandTotals = new Map();   // cid → prev votes
    const prevCandPcts   = new Map();   // cid → prev vote_pct

    groups.forEach((grp, idx) => {
      const latestInGroup = grp.drops[grp.drops.length - 1]; // newest in bucket
      const drop_total    = latestInGroup.drop_total;
      const new_votes_in_drop = drop_total - prevTotal;
      const isFirst       = idx === 0;

      const newCands = latestInGroup.candidates.map(c => {
        const prevV = prevCandTotals.get(c.candidate_id) || 0;
        const prevP = prevCandPcts.get(c.candidate_id)   || 0;
        const new_votes     = c.votes - prevV;
        const pct_delta     = +(c.vote_pct - prevP).toFixed(2);
        const new_votes_pct = new_votes_in_drop > 0
          ? +(new_votes / new_votes_in_drop * 100).toFixed(2)
          : 0;

        return {
          ...c,
          new_votes,
          new_votes_pct,
          pct_delta,
          is_first_drop: isFirst,
        };
      });

      merged.push({
        batch_id:          latestInGroup.batch_id,
        batch_ts:          latestInGroup.batch_ts,
        source_file:       latestInGroup.source_file,
        drop_total:        drop_total,
        new_votes_in_drop: new_votes_in_drop,
        reporting_pct:     latestInGroup.reporting_pct,
        bucket_size:       grp.drops.length,   // how many raw drops merged
        candidates:        newCands,
      });

      prevTotal = drop_total;
      latestInGroup.candidates.forEach(c => {
        prevCandTotals.set(c.candidate_id, c.votes);
        prevCandPcts.set(c.candidate_id, c.vote_pct);
      });
    });

    // Return newest-first to match rawDrops convention
    return merged.reverse();
  }

  function buildRaceCard(race, data) {
    const card = document.createElement('div');
    card.className = 'race-card';
    card.dataset.contestId = race.contest_id;

    const rawDrops   = data.drops || [];
    const drops      = bucketDrops(rawDrops, state.bucketMinutes);
    const latestDrop = drops[0];
    const repPct     = latestDrop ? latestDrop.reporting_pct : null;

    const nameStr = race.district ? `${race.office} — ${race.district}` : race.office;
    const metaStr = [
      race.source === 'la_county' ? 'LA County' : 'Statewide',
      repPct != null ? repPct.toFixed(0)+'% reporting' : null,
      state.bucketMinutes > 0 && rawDrops.length !== drops.length
        ? `${drops.length} of ${rawDrops.length} drops`
        : `${drops.length} drop${drops.length !== 1 ? 's' : ''}`,
    ].filter(Boolean).join(' · ');

    const hdr = document.createElement('div');
    hdr.className = 'race-card-header';
    hdr.innerHTML = `<span class="race-name">${nameStr}</span><div style="display:flex;align-items:center;gap:10px"><button class="race-copy-link" onclick="copyRaceLink(${race.contest_id},this)" title="Copy a link to this race">link</button><span class="race-meta">${metaStr}</span></div>`;
    card.appendChild(hdr);

    if (!drops.length) {
      card.innerHTML += '<div class="loading-msg">No results yet.</div>';
      return card;
    }

    // Candidates from latest drop
    let candidates = [...(latestDrop.candidates || [])];

    // Sort by current votes descending
    candidates.sort((a, b) => b.votes - a.votes);

    // Apply name/party search filter
    if (state.candSearch) {
      candidates = candidates.filter(c =>
        c.name.toLowerCase().includes(state.candSearch) ||
        c.party.toLowerCase().includes(state.candSearch)
      );
    }

    // Apply pct threshold filter — keep the filtered-out ones for the "Other" row
    let otherCandidates = [];
    if (state.pctThreshold > 0) {
      otherCandidates = candidates.filter(c => c.vote_pct < state.pctThreshold);
      candidates      = candidates.filter(c => c.vote_pct >= state.pctThreshold);
    }

    if (!candidates.length && !otherCandidates.length) {
      card.innerHTML += '<div class="empty-msg">No candidates match current filters.</div>';
      return card;
    }

    const colTemplate = `var(--col-name) repeat(${drops.length}, var(--col-drop))`;

    const wrap  = document.createElement('div');
    wrap.className = 'race-table-wrap';

    const table = document.createElement('div');
    table.className = 'race-table';
    table.style.gridTemplateColumns = colTemplate;

    // ---- Header row ----
    const headRow = document.createElement('div');
    headRow.className = 'table-row';
    headRow.appendChild(makeCell(['cell-head','cell-name'],
      `<span class="col-label">Candidate</span>`));

    // Current (newest) total for computing each drop's % of current
    const currentTotal = drops[0].drop_total || 0;

    drops.forEach((drop, i) => {
      const isNewest = i === 0;
      const newStr   = drop.new_votes_in_drop > 0
        ? `+${fmt(drop.new_votes_in_drop)} new`
        : `initial drop`;
      const rp       = drop.reporting_pct != null ? drop.reporting_pct : 0;
      const repBar   = drop.reporting_pct != null
        ? `<div class="rep-bar"><div class="rep-bar-fill" style="width:${rp}%"></div></div>` : '';
      const pctOfCur = currentTotal > 0 && drop.new_votes_in_drop > 0
        ? (drop.new_votes_in_drop / currentTotal * 100).toFixed(1) + '% of current'
        : '';
      const mergedTag = drop.bucket_size && drop.bucket_size > 1
        ? `<span class="bucket-tag">${drop.bucket_size} drops merged</span>` : '';

      headRow.appendChild(makeCell(
        ['cell-head', isNewest ? 'cell-newest' : ''],
        `<span class="drop-ts ${isNewest ? 'newest-ts' : ''}">${isNewest ? '▶ ' : ''}${fmtTs(drop.batch_ts)}<span class="drop-date">${fmtDate(drop.batch_ts)}</span></span>
         <span class="drop-total-line">${fmt(drop.drop_total)} votes</span>
         <span class="drop-total-line">${newStr}${pctOfCur ? ' · ' + pctOfCur : ''}</span>
         ${mergedTag}
         ${repBar}`
      ));
    });
    table.appendChild(headRow);

    // ---- Candidate rows ----
    candidates.forEach(c => {
      const key      = `${race.contest_id}-${c.candidate_id}`;
      const isHidden = state.hiddenCandidates.has(key);
      const row      = document.createElement('div');
      row.className  = 'table-row' + (isHidden ? ' row-hidden' : '');
      row.dataset.candidateKey = key;

      // Name cell
      row.appendChild(makeCell(['cell-name'],
        `<span class="cand-name-text" title="${c.name}">${c.name}</span>
         <span class="cand-party-badge ${partyClass(c.party)}">${c.party}</span>
         <button class="hide-btn" onclick="toggleCandidate('${key}',this)">${isHidden?'show':'hide'}</button>`
      ));

      // Data cells
      drops.forEach((drop, i) => {
        const isNewest = i === 0;
        const dc = drop.candidates.find(x => x.candidate_id === c.candidate_id);
        let inner = '';

        if (!dc) {
          inner = `<span class="pct-big">—</span>`;
        } else {
          const color  = partyColor(c.party);
          const pctW   = Math.min(dc.vote_pct, 100).toFixed(1);

          // Delta sits inline next to the percent
          let deltaInline = '';
          if (!dc.is_first_drop && dc.pct_delta !== 0) {
            const sign   = dc.pct_delta > 0 ? '+' : '';
            const dClass = dc.pct_delta > 0 ? 'pos' : 'neg';
            deltaInline = `<span class="delta-inline ${dClass}">${sign}${dc.pct_delta.toFixed(1)}%</span>`;
          }

          // New-votes line below
          let newLine = '';
          if (dc.is_first_drop) {
            newLine = `<span class="new-line">initial drop</span>`;
          } else {
            newLine = `<span class="new-line">+${fmt(dc.new_votes)} new (${fmtPct(dc.new_votes_pct)})</span>`;
          }

          inner = `
            <span class="pct-line"><span class="pct-big">${fmtPct(dc.vote_pct)}</span>${deltaInline}</span>
            <span class="votes-sub">${fmt(dc.votes)} votes</span>
            <div class="pct-bar"><div class="pct-bar-fill" style="width:${pctW}%;background:${color}"></div></div>
            ${newLine}`;
        }

        row.appendChild(makeCell([isNewest ? 'cell-newest' : ''], inner));
      });

      table.appendChild(row);
    });

    // ---- "Other candidates" aggregated row (pct threshold grouping) ----
    if (otherCandidates.length > 0) {
      const otherIds = new Set(otherCandidates.map(c => c.candidate_id));
      const row = document.createElement('div');
      row.className = 'table-row cand-other';

      row.appendChild(makeCell(['cell-name'],
        `<span class="cand-name-text">Other candidates (${otherCandidates.length})</span>`
      ));

      drops.forEach((drop, i) => {
        const isNewest = i === 0;
        const dcs = drop.candidates.filter(x => otherIds.has(x.candidate_id));
        let inner = '';
        if (!dcs.length) {
          inner = `<span class="pct-big">—</span>`;
        } else {
          const votes     = dcs.reduce((s, x) => s + (x.votes     || 0), 0);
          const vote_pct  = dcs.reduce((s, x) => s + (x.vote_pct  || 0), 0);
          const new_votes = dcs.reduce((s, x) => s + (x.new_votes || 0), 0);
          const new_pct   = dcs.reduce((s, x) => s + (x.new_votes_pct || 0), 0);
          const pct_delta = dcs.reduce((s, x) => s + (x.pct_delta || 0), 0);
          const isFirst   = dcs.every(x => x.is_first_drop);
          const pctW      = Math.min(vote_pct, 100).toFixed(1);

          let deltaInline = '';
          if (!isFirst && pct_delta !== 0) {
            const sign   = pct_delta > 0 ? '+' : '';
            const dClass = pct_delta > 0 ? 'pos' : 'neg';
            deltaInline = `<span class="delta-inline ${dClass}">${sign}${pct_delta.toFixed(1)}%</span>`;
          }
          const newLine = isFirst
            ? `<span class="new-line">initial drop</span>`
            : `<span class="new-line">+${fmt(new_votes)} new (${fmtPct(new_pct)})</span>`;

          inner = `
            <span class="pct-line"><span class="pct-big">${fmtPct(vote_pct)}</span>${deltaInline}</span>
            <span class="votes-sub">${fmt(votes)} votes</span>
            <div class="pct-bar"><div class="pct-bar-fill" style="width:${pctW}%;background:var(--muted)"></div></div>
            ${newLine}`;
        }
        row.appendChild(makeCell([isNewest ? 'cell-newest' : ''], inner));
      });

      table.appendChild(row);
    }

    wrap.appendChild(table);
    card.appendChild(wrap);
    return card;
  }

  function makeCell(classes, html) {
    const el = document.createElement('div');
    el.className = ['cell', ...classes.filter(Boolean)].join(' ');
    el.innerHTML = html;
    return el;
  }

  function toggleCandidate(key, btn) {
    const isHidden = state.hiddenCandidates.has(key);
    if (isHidden) { state.hiddenCandidates.delete(key); btn.textContent = 'hide'; }
    else          { state.hiddenCandidates.add(key);    btn.textContent = 'show'; }
    document.querySelectorAll(`[data-candidate-key="${key}"]`).forEach(row => {
      row.classList.toggle('row-hidden', !isHidden);
      const b = row.querySelector('.hide-btn');
      if (b) b.textContent = isHidden ? 'hide' : 'show';
    });
  }

  // Auto-refresh every 60 seconds
  // Auto-refresh every 60s in live (Flask) mode only
  if (!STATIC_MODE) {
    setInterval(() => { state.raceData = {}; renderAll(); }, 60_000);
  }

  // Init — restore state from URL hash if present
  updateJumpBtn();
  let _preselect = null;
  (function initFromHash() {
    const hash = window.location.hash.slice(1);
    if (!hash) return;
    const params = new URLSearchParams(hash);
    const src = params.get('source');
    if (src === 'statewide' || src === 'la_county') {
      state.source = src;
      document.querySelectorAll('.source-toggle button').forEach(b => {
        const isMatch = (src === 'statewide' && b.textContent.trim() === 'Statewide') ||
                        (src === 'la_county'  && b.textContent.trim() === 'LA County');
        b.classList.toggle('active', isMatch);
      });
      updateJumpBtn();
    }
    const racesParam = params.get('races');
    if (racesParam) {
      _preselect = new Set(racesParam.split(',').map(Number).filter(n => n > 0));
    }
    const minPct = parseFloat(params.get('minpct'));
    if (minPct > 0) {
      state.pctThreshold = minPct;
      const inp = document.getElementById('pct-threshold');
      if (inp) inp.value = minPct;
    }
  })();
  loadOffices(_preselect);
</script>
</body>
</html>
